<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Froggo</title>
  <link rel="icon" href="favicon.png" type="image/svg+xml" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <link rel="apple-touch-icon" id="apple-touch-icon" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Froggo" />
  <meta name="theme-color" content="#0f1116" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1116;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #39d353;
      --accent2: #78e888;
      --green: #34d399;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 16px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      padding: calc(env(safe-area-inset-top) + 20px) 20px 0;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent2); }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 14px;
    }
    .month-nav button {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 20px; cursor: pointer;
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    .month-nav button:active { background: var(--surface2); }
    .month-nav button:disabled { opacity: .3; cursor: default; }
    #month-label {
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
      color: var(--text); text-align: center; flex: 1;
    }

    .settings-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 6px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .settings-btn:active { color: var(--text); background: var(--surface2); }
    .settings-btn .material-icons-round { font-size: 22px; }
    .settings-btn.active { color: var(--accent); }

    /* ── Summary ── */
    .summary {
      margin: 0 16px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .summary-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
    .summary-amount { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; color: var(--text); }
    .summary-count { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .history-list {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 0 16px calc(96px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }
    .history-list::-webkit-scrollbar { display: none; }

    .day-group { margin-bottom: 12px; }
    .day-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 0 4px 6px;
    }

    .expense-item {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      gap: 12px;
      cursor: pointer;
      transition: background .12s;
    }
    .expense-item:active { background: var(--surface2); }
    .expense-emoji { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }
    .expense-info { flex: 1; min-width: 0; }
    .expense-desc {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .expense-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .expense-amount { font-size: 18px; font-weight: 800; color: var(--text); flex-shrink: 0; }
    .expense-chevron { color: var(--muted); font-size: 14px; flex-shrink: 0; margin-left: 4px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px 16px;
      font-size: 15px;
    }
    .empty-state .big { font-size: 48px; margin-bottom: 12px; }

    /* ── FAB ── */
    .fab-btn {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom));
      right: 20px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0f1116;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(57, 211, 83, 0.4);
      transition: transform .12s, opacity .12s;
      z-index: 10;
    }
    .fab-btn .material-icons-round { font-size: 30px; }
    .fab-btn:active { transform: scale(.9); opacity: .85; }

    /* ── Bottom sheets ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      z-index: 101;
      transition: transform .3s cubic-bezier(.32,0,.67,0);
      padding: 0 20px calc(24px + env(safe-area-inset-bottom));
    }
    .bottom-sheet.open {
      transform: translateX(-50%) translateY(0);
      transition-timing-function: cubic-bezier(.33,1,.68,1);
    }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 14px auto 20px;
    }
    .sheet-title {
      font-size: 17px; font-weight: 700;
      margin-bottom: 18px; text-align: center;
    }
    .sheet-field { margin-bottom: 12px; }
    .sheet-field-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .sheet-field-row .sheet-field { flex: 1; margin-bottom: 0; }
    .sheet-field label {
      display: block;
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 6px;
    }
    .sheet-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .sheet-input:focus { border-color: var(--accent); }
    .sheet-input.sm { font-size: 16px; font-weight: 500; }
    .sheet-input[type="date"]::-webkit-calendar-picker-indicator,
    .sheet-input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .5; cursor: pointer; }
    .sheet-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

    .btn-save {
      width: 100%; padding: 15px;
      background: var(--accent); border: none; border-radius: 13px;
      font-size: 16px; font-weight: 700; color: #fff; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-save:active { opacity: .85; }
    .btn-save:disabled { opacity: .35; cursor: default; }

    .btn-delete {
      width: 100%; padding: 13px;
      background: none; border: 2px solid var(--border); border-radius: 13px;
      font-size: 15px; font-weight: 600; color: var(--red); cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .btn-delete:active { background: rgba(248,113,113,.1); border-color: var(--red); }

    .sheet-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }
    .suggestion-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .suggestion-chip:active { background: var(--accent); border-color: var(--accent); }

    /* ── Settings sheet rows ── */
    .settings-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      gap: 16px;
    }
    .settings-row + .settings-row { border-top: 1px solid var(--border); }
    .settings-row-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .settings-row-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

    .settings-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 17px; font-weight: 700;
      color: var(--text);
      cursor: pointer;
      min-width: 70px;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      flex-shrink: 0;
    }
    .settings-select:focus { border-color: var(--accent); }

    /* ── Confirm modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      width: 100%;
      max-width: 320px;
      padding: 28px 24px 20px;
      text-align: center;
      transform: scale(.92);
      transition: transform .2s cubic-bezier(.33,1,.68,1);
      border: 1px solid var(--border);
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-icon { font-size: 40px; margin-bottom: 12px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .modal-body { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-cancel {
      flex: 1; padding: 13px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
      font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer;
    }
    .modal-cancel:active { opacity: .8; }
    .modal-confirm {
      flex: 1; padding: 13px;
      background: var(--red); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; color: #fff; cursor: pointer;
    }
    .modal-confirm:active { opacity: .85; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      background: var(--green);
      color: #0f1116;
      font-size: 14px; font-weight: 700;
      padding: 10px 22px;
      border-radius: 100px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .amount-frac { opacity: 0.6; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px 12px; flex-wrap: wrap;
    }
    .filter-toggle-btn {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 6px 12px 6px 10px;
      font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; white-space: nowrap;
      transition: border-color .15s, color .15s;
    }
    .filter-toggle-btn .material-icons-round { font-size: 16px; }
    .filter-toggle-btn.active { border-color: var(--accent); color: var(--accent); }
    .active-filter-chip {
      display: flex; align-items: center; gap: 4px;
      background: var(--accent); border: none; border-radius: 20px;
      padding: 5px 10px; font-size: 12px; font-weight: 700; color: #0f1116;
      cursor: pointer;
    }
    .active-filter-chip .material-icons-round { font-size: 14px; }

    /* ── Filter sheet ── */
    .filter-amount-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .filter-amount-sep { font-size: 18px; color: var(--muted); flex-shrink: 0; }
    .filter-presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-preset-chip {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .filter-preset-chip.active { border-color: var(--accent); color: var(--accent); }
    .filter-tag-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-tag-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .filter-tag-chip.active { border-color: var(--accent); color: var(--accent); }
    .filter-no-tags { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">frog<span>go</span></div>
    <div style="display:flex;gap:4px">
      <button class="settings-btn" id="filter-btn" aria-label="Filter">
        <span class="material-icons-round">filter_list</span>
      </button>
      <button class="settings-btn" id="settings-btn" aria-label="Settings">
        <span class="material-icons-round">settings</span>
      </button>
    </div>
  </div>
  <div class="month-nav">
    <button id="prev-month" aria-label="Previous month">‹</button>
    <span id="month-label"></span>
    <button id="next-month" aria-label="Next month">›</button>
  </div>
</header>

<div class="summary">
  <div class="summary-label">Total spent this month</div>
  <div class="summary-amount"><span id="total-amount">0.00</span></div>
  <div class="summary-count" id="total-count">0 expenses</div>
</div>

<div class="main-content">
  <div class="history-list" id="history-list"></div>
  <button class="fab-btn" id="fab-add" aria-label="Add expense">
    <span class="material-icons-round">add</span>
  </button>
</div>

<!-- Add expense sheet -->
<div class="sheet-overlay" id="add-overlay"></div>
<div class="bottom-sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Add Expense</div>
  <div class="sheet-field">
    <label>Amount</label>
    <input class="sheet-input" id="add-amount" type="text" inputmode="decimal" placeholder="0" autocomplete="off" />
  </div>
  <div class="sheet-field">
    <label>Description</label>
    <input class="sheet-input sm" id="add-desc" type="text" placeholder="Coffee, rent, groceries…" maxlength="40" autocomplete="off" autocorrect="off" autocapitalize="words" />
  </div>
  <div class="sheet-suggestions" id="add-suggestions"></div>
  <div class="sheet-actions">
    <button class="btn-save" id="btn-add-confirm" disabled>Add Expense</button>
  </div>
</div>

<!-- Edit sheet -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Edit Expense</div>
  <div class="sheet-field">
    <label>Amount</label>
    <input class="sheet-input" id="edit-amount" type="number" inputmode="decimal" step="0.01" min="0" />
  </div>
  <div class="sheet-field">
    <label>Description</label>
    <input class="sheet-input sm" id="edit-desc" type="text" maxlength="40" autocorrect="off" autocapitalize="words" />
  </div>
  <div class="sheet-field-row">
    <div class="sheet-field">
      <label>Date</label>
      <input class="sheet-input sm" id="edit-date" type="date" />
    </div>
    <div class="sheet-field">
      <label>Time</label>
      <input class="sheet-input sm" id="edit-time" type="time" />
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn-save" id="btn-save">Save Changes</button>
    <button class="btn-delete" id="btn-delete-from-sheet">Delete Expense</button>
  </div>
</div>

<!-- Settings sheet -->
<div class="sheet-overlay" id="settings-overlay"></div>
<div class="bottom-sheet" id="settings-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Settings</div>
  <div class="settings-card">
    <div class="settings-row">
      <div>
        <div class="settings-row-label">Cycle starts on day</div>
        <div class="settings-row-desc">Count expenses from this day of the month</div>
      </div>
      <select id="cycle-start-day" class="settings-select"></select>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-row-label">Currency</div>
        <div class="settings-row-desc">Symbol shown next to amounts</div>
      </div>
      <select id="currency-select" class="settings-select"></select>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-row-label">Time format</div>
        <div class="settings-row-desc">12-hour (AM/PM) or 24-hour clock</div>
      </div>
      <select id="time-format-select" class="settings-select">
        <option value="12h">12h</option>
        <option value="24h">24h</option>
      </select>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-row-label">Date format</div>
        <div class="settings-row-desc">Order of day and month</div>
      </div>
      <select id="date-format-select" class="settings-select">
        <option value="dmy">14 Jun</option>
        <option value="mdy">Jun 14</option>
      </select>
    </div>
  </div>
</div>

<!-- Filter sheet -->
<div class="sheet-overlay" id="filter-overlay"></div>
<div class="bottom-sheet" id="filter-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Filter Expenses</div>
  <div class="sheet-field">
    <label>Price Range</label>
    <div class="filter-amount-row">
      <input class="sheet-input sm" id="filter-min" type="number" inputmode="decimal" placeholder="Min" min="0" step="0.01" />
      <span class="filter-amount-sep">–</span>
      <input class="sheet-input sm" id="filter-max" type="number" inputmode="decimal" placeholder="Max" min="0" step="0.01" />
    </div>
    <div class="filter-presets">
      <button class="filter-preset-chip" data-min="" data-max="20">&lt; 20</button>
      <button class="filter-preset-chip" data-min="20" data-max="50">20 – 50</button>
      <button class="filter-preset-chip" data-min="50" data-max="100">50 – 100</button>
      <button class="filter-preset-chip" data-min="100" data-max="">&gt; 100</button>
    </div>
  </div>
  <div class="sheet-field">
    <label>Description</label>
    <div class="filter-tag-chips" id="filter-tag-chips"></div>
  </div>
  <div class="sheet-actions">
    <button class="btn-save" id="btn-apply-filter">Apply</button>
    <button class="btn-delete" id="btn-clear-filter" style="color:var(--muted)">Clear All</button>
  </div>
</div>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">Delete expense?</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-confirm" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'froggo_expenses';
const SUGGESTIONS_KEY = 'froggo_suggestions';
const SETTINGS_KEY = 'froggo_settings';

// Migrate data from old "froggy" keys if present
['expenses', 'suggestions', 'settings'].forEach(k => {
  const old = localStorage.getItem(`froggy_${k}`);
  if (old && !localStorage.getItem(`froggo_${k}`)) {
    localStorage.setItem(`froggo_${k}`, old);
  }
});

let expenses = [];
let viewYear, viewMonth;
let editingId = null;
let pendingDeleteId = null;
let activeFilter = { minAmount: null, maxAmount: null, tag: null };

// ── Persistence ──
function load() {
  try { expenses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { expenses = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
}
function loadSuggestions() {
  try { return JSON.parse(localStorage.getItem(SUGGESTIONS_KEY)) || []; } catch { return []; }
}
function saveSuggestion(desc) {
  if (!desc) return;
  let list = loadSuggestions();
  list = [desc, ...list.filter(s => s.toLowerCase() !== desc.toLowerCase())].slice(0, 12);
  localStorage.setItem(SUGGESTIONS_KEY, JSON.stringify(list));
}

// ── Settings ──
function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
}
function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}
function getCycleStartDay() {
  return getSettings().cycleStartDay || 1;
}
function getCurrency() {
  return getSettings().currency || '';
}
function getTimeFormat() {
  return getSettings().timeFormat || '12h';
}
function getDateFormat() {
  return getSettings().dateFormat || 'dmy';
}

// ── Date helpers ──
function initView() {
  const now = new Date();
  const startDay = getCycleStartDay();
  if (now.getDate() >= startDay) {
    viewYear = now.getFullYear(); viewMonth = now.getMonth();
  } else {
    const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    viewYear = prev.getFullYear(); viewMonth = prev.getMonth();
  }
}

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT_MONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SHORT_DAY   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function fmtAmount(n) {
  const currency = getCurrency();
  if (currency) {
    return Number(n).toLocaleString(undefined, { style: 'currency', currency });
  }
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtAmountHTML(n) {
  const currency = getCurrency();
  const opts = currency
    ? { style: 'currency', currency }
    : { minimumFractionDigits: 2, maximumFractionDigits: 2 };
  const parts = new Intl.NumberFormat(currency ? undefined : 'en-US', opts).formatToParts(Number(n));
  return parts.map(p =>
    (p.type === 'decimal' || p.type === 'fraction')
      ? `<span class="amount-frac">${p.value}</span>`
      : p.value
  ).join('');
}
function fmtTime(isoStr) {
  return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: getTimeFormat() === '12h' });
}
function dayLabel(isoStr) {
  const d = new Date(isoStr);
  const dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const nDate = new Date(); nDate.setHours(0,0,0,0);
  const diff = Math.round((nDate - dDate) / 86400000);
  const day = d.getDate(), mon = SHORT_MONTH[d.getMonth()], dow = SHORT_DAY[d.getDay()];
  const datePart = getDateFormat() === 'dmy' ? `${dow}, ${day} ${mon}` : `${dow}, ${mon} ${day}`;
  if (diff === 0) return `Today · ${datePart}`;
  if (diff === 1) return `Yesterday · ${datePart}`;
  return datePart;
}
const TAGS = [
  { label: 'Coffee',    emoji: '☕', re: /coffee|latte|espresso|cappuccino/ },
  { label: 'Tea',       emoji: '🍵', re: /tea/ },
  { label: 'Food',      emoji: '🍔', re: /food|lunch|dinner|breakfast|meal|eat|restaurant|snack|fries|burger|pizza|sushi|taco|sandwich/ },
  { label: 'Groceries', emoji: '🛒', re: /groceries|grocery|supermarket|market/ },
  { label: 'Ride',      emoji: '🚕', re: /uber|lyft|taxi|cab|ride/ },
  { label: 'Gas',       emoji: '⛽', re: /gas|petrol|fuel/ },
  { label: 'Car',       emoji: '🚗', re: /car|parking|park/ },
  { label: 'Transit',   emoji: '🚌', re: /bus|metro|subway|transit|train/ },
  { label: 'Travel',    emoji: '✈️', re: /flight|plane|airline|airport/ },
  { label: 'Hotel',     emoji: '🏨', re: /hotel|airbnb|lodging/ },
  { label: 'Books',     emoji: '📚', re: /book|kindle|course|class|learn/ },
  { label: 'Movies',    emoji: '🎬', re: /movie|cinema|netflix|film/ },
  { label: 'Gaming',    emoji: '🎮', re: /game|gaming|playstation|xbox|steam/ },
  { label: 'Music',     emoji: '🎵', re: /music|spotify|concert/ },
  { label: 'Fitness',   emoji: '💪', re: /gym|fitness|sport|yoga/ },
  { label: 'Health',    emoji: '💊', re: /doctor|medical|pharmacy|health|dentist/ },
  { label: 'Clothes',   emoji: '👕', re: /clothes|clothing|shirt|shoes|jacket/ },
  { label: 'Haircut',   emoji: '✂️', re: /haircut|salon|barber/ },
  { label: 'Housing',   emoji: '🏠', re: /rent|mortgage|housing/ },
  { label: 'Utilities', emoji: '💡', re: /electricity|water|internet|phone|utility/ },
  { label: 'Income',    emoji: '💰', re: /salary|income|pay/ },
  { label: 'Shopping',  emoji: '📦', re: /amazon|shopping|order/ },
  { label: 'Gifts',     emoji: '🎁', re: /gift|present/ },
  { label: 'Drinks',    emoji: '🍺', re: /bar|beer|wine|drink|alcohol/ },
  { label: 'Ice Cream', emoji: '🍦', re: /ice cream|icecream/ },
  { label: 'Dessert',   emoji: '🍰', re: /cake|dessert|chocolate/ },
];
function tagFor(desc) {
  const d = (desc || '').toLowerCase();
  for (const t of TAGS) if (t.re.test(d)) return t;
  return null;
}
function emojiFor(desc) {
  const t = tagFor(desc);
  return t ? t.emoji : '💸';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ── Render ──
function render() {
  renderMonthLabel();
  renderSummary();
  renderFilterBar();
  renderHistory();
}

function renderMonthLabel() {
  document.getElementById('month-label').textContent = `${MONTH_NAMES[viewMonth].slice(0,3)} ${viewYear}`;
  const nextCycleStart = new Date(viewYear, viewMonth + 1, getCycleStartDay());
  document.getElementById('next-month').disabled = nextCycleStart > new Date();
}

function monthExpenses() {
  const startDay = getCycleStartDay();
  const cycleStart = new Date(viewYear, viewMonth, startDay);
  const cycleEnd = new Date(viewYear, viewMonth + 1, startDay);
  return expenses.filter(e => {
    const d = new Date(e.date);
    return d >= cycleStart && d < cycleEnd;
  });
}

function renderSummary() {
  const list = applyFilter(monthExpenses());
  const total = list.reduce((s, e) => s + parseFloat(e.amount), 0);
  document.getElementById('total-amount').innerHTML = fmtAmountHTML(total);
  const n = list.length;
  document.getElementById('total-count').textContent = `${n} expense${n !== 1 ? 's' : ''}`;
}

function applyFilter(list) {
  const { minAmount, maxAmount, tag } = activeFilter;
  if (minAmount === null && maxAmount === null && tag === null) return list;
  return list.filter(e => {
    const amount = parseFloat(e.amount);
    if (minAmount !== null && amount < minAmount) return false;
    if (maxAmount !== null && amount > maxAmount) return false;
    if (tag !== null && (e.desc || '').toLowerCase() !== tag) return false;
    return true;
  });
}

function renderHistory() {
  const list = applyFilter(monthExpenses()).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const container = document.getElementById('history-list');

  if (!list.length) {
    const hasFilter = activeFilter.minAmount !== null || activeFilter.maxAmount !== null || activeFilter.tag !== null;
    container.innerHTML = hasFilter
      ? `<div class="empty-state"><div class="big">🐸</div>No expenses match this filter.</div>`
      : `<div class="empty-state"><div class="big">🐸</div>No expenses yet.<br>Tap + to add your first one!</div>`;
    return;
  }

  const groups = {};
  for (const e of list) {
    const label = dayLabel(e.date);
    if (!groups[label]) groups[label] = [];
    groups[label].push(e);
  }

  container.innerHTML = Object.entries(groups).map(([label, items]) => `
    <div class="day-group">
      <div class="day-label">${label}</div>
      ${items.map(e => `
        <div class="expense-item" data-id="${e.id}">
          <div class="expense-emoji">${emojiFor(e.desc)}</div>
          <div class="expense-info">
            <div class="expense-desc">${escHtml(e.desc || 'Expense')}</div>
            <div class="expense-time">${fmtTime(e.date)}</div>
          </div>
          <div class="expense-amount">${fmtAmountHTML(e.amount)}</div>
          <div class="expense-chevron">›</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ── Suggestions ──
function renderAddSuggestions(query) {
  const all = loadSuggestions();
  const filtered = query ? all.filter(s => s.toLowerCase().includes(query.toLowerCase())) : all;
  document.getElementById('add-suggestions').innerHTML = filtered.slice(0, 8).map(s =>
    `<button class="suggestion-chip" data-val="${escHtml(s)}">${escHtml(s)}</button>`
  ).join('');
}

// ── Add sheet ──
function openAddSheet() {
  document.getElementById('add-amount').value = '';
  document.getElementById('add-desc').value = '';
  renderAddSuggestions('');
  updateAddConfirmBtn();
  document.getElementById('add-overlay').classList.add('open');
  document.getElementById('add-sheet').classList.add('open');
  document.getElementById('add-amount').focus();
}

function closeAddSheet() {
  document.getElementById('add-overlay').classList.remove('open');
  document.getElementById('add-sheet').classList.remove('open');
}

function updateAddConfirmBtn() {
  document.getElementById('btn-add-confirm').disabled = !(parseFloat(document.getElementById('add-amount').value) > 0);
}

function confirmAdd() {
  const amount = parseFloat(document.getElementById('add-amount').value);
  const desc = document.getElementById('add-desc').value.trim();
  if (!amount || amount <= 0) return;

  expenses.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    amount: amount.toFixed(2),
    desc,
    date: new Date().toISOString(),
  });
  save();
  saveSuggestion(desc);
  initView();
  closeAddSheet();
  render();
  showToast(`Added ${fmtAmount(amount)}`);
}

// ── Edit sheet ──
function openEditSheet(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('edit-amount').value = e.amount;
  document.getElementById('edit-desc').value = e.desc;
  const _d = new Date(e.date);
  document.getElementById('edit-date').value = _d.toLocaleDateString('en-CA');
  document.getElementById('edit-time').value = _d.toTimeString().slice(0, 5);
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
  setTimeout(() => document.getElementById('edit-amount').focus(), 320);
}

function closeEditSheet() {
  editingId = null;
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

function saveEdit() {
  if (!editingId) return;
  const amount = parseFloat(document.getElementById('edit-amount').value);
  const desc = document.getElementById('edit-desc').value.trim();
  const dateVal = document.getElementById('edit-date').value;
  const timeVal = document.getElementById('edit-time').value;
  if (!amount || amount <= 0) return;
  const idx = expenses.findIndex(x => x.id === editingId);
  if (idx === -1) return;
  expenses[idx].amount = amount.toFixed(2);
  expenses[idx].desc = desc;
  if (dateVal) expenses[idx].date = new Date(`${dateVal}T${timeVal || '12:00'}:00`).toISOString();
  save();
  saveSuggestion(desc);
  closeEditSheet();
  render();
  showToast('Saved');
}

// ── Filter ──
function renderFilterBar() {
  const { minAmount, maxAmount, tag } = activeFilter;
  const hasFilter = minAmount !== null || maxAmount !== null || tag !== null;
  document.getElementById('filter-btn').classList.toggle('active', hasFilter);
}

function openFilterSheet() {
  document.getElementById('filter-min').value = activeFilter.minAmount ?? '';
  document.getElementById('filter-max').value = activeFilter.maxAmount ?? '';
  syncPresetChips();
  renderFilterTagChips();
  document.getElementById('filter-overlay').classList.add('open');
  document.getElementById('filter-sheet').classList.add('open');
}

function closeFilterSheet() {
  document.getElementById('filter-overlay').classList.remove('open');
  document.getElementById('filter-sheet').classList.remove('open');
}

function syncPresetChips() {
  const min = document.getElementById('filter-min').value;
  const max = document.getElementById('filter-max').value;
  document.querySelectorAll('.filter-preset-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.min === min && c.dataset.max === max)
  );
}

function renderFilterTagChips() {
  const seen = new Map();
  for (const e of monthExpenses()) {
    const key = (e.desc || '').toLowerCase();
    if (!seen.has(key)) seen.set(key, { desc: e.desc || 'Expense', emoji: emojiFor(e.desc) });
  }
  const container = document.getElementById('filter-tag-chips');
  if (!seen.size) {
    container.innerHTML = `<span class="filter-no-tags">No expenses in this month</span>`;
    return;
  }
  container.innerHTML = [...seen.values()].map(({ desc, emoji }) =>
    `<button class="filter-tag-chip${activeFilter.tag === desc.toLowerCase() ? ' active' : ''}" data-tag="${escHtml(desc.toLowerCase())}">${emoji} ${escHtml(desc)}</button>`
  ).join('');
  container.querySelectorAll('.filter-tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeFilter.tag = activeFilter.tag === chip.dataset.tag ? null : chip.dataset.tag;
      container.querySelectorAll('.filter-tag-chip').forEach(c => c.classList.toggle('active', c.dataset.tag === activeFilter.tag));
    });
  });
}

// ── Settings sheet ──
function openSettingsSheet() {
  document.getElementById('settings-overlay').classList.add('open');
  document.getElementById('settings-sheet').classList.add('open');
}

function closeSettingsSheet() {
  document.getElementById('settings-overlay').classList.remove('open');
  document.getElementById('settings-sheet').classList.remove('open');
}

function initSettingsUI() {
  const sel = document.getElementById('cycle-start-day');
  for (let i = 1; i <= 28; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = ordinal(i);
    sel.appendChild(opt);
  }
  sel.value = getCycleStartDay();
  sel.addEventListener('change', () => {
    const s = getSettings();
    s.cycleStartDay = parseInt(sel.value);
    saveSettings(s);
    initView();
    render();
  });

  const CURRENCIES = ['', 'USD', 'EUR', 'GBP', 'ILS', 'JPY', 'CAD', 'AUD', 'CHF', 'INR', 'BRL', 'MXN', 'SGD', 'NOK', 'SEK'];
  const currSel = document.getElementById('currency-select');
  CURRENCIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c || 'None';
    currSel.appendChild(opt);
  });
  currSel.value = getCurrency();
  currSel.addEventListener('change', () => {
    const s = getSettings();
    s.currency = currSel.value;
    saveSettings(s);
    render();
  });

  const timeFormatSel = document.getElementById('time-format-select');
  timeFormatSel.value = getTimeFormat();
  timeFormatSel.addEventListener('change', () => {
    const s = getSettings();
    s.timeFormat = timeFormatSel.value;
    saveSettings(s);
    render();
  });

  const dateFormatSel = document.getElementById('date-format-select');
  dateFormatSel.value = getDateFormat();
  dateFormatSel.addEventListener('change', () => {
    const s = getSettings();
    s.dateFormat = dateFormatSel.value;
    saveSettings(s);
    render();
  });
}

// ── Delete confirm ──
function askDelete(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  pendingDeleteId = id;
  const desc = e.desc || 'this expense';
  document.getElementById('modal-body').textContent = `"${desc}" for ${fmtAmount(e.amount)} will be permanently removed.`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  pendingDeleteId = null;
  document.getElementById('modal-overlay').classList.remove('open');
}

function confirmDelete() {
  if (!pendingDeleteId) return;
  expenses = expenses.filter(e => e.id !== pendingDeleteId);
  save();
  closeModal();
  closeEditSheet();
  render();
  showToast('Deleted');
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Month nav ──
function changeMonth(delta) {
  activeFilter = { minAmount: null, maxAmount: null, tag: null };
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }

  renderMonthLabel();
  renderSummary();

  const list = document.getElementById('history-list');
  const exitX = delta > 0 ? '-100%' : '100%';
  const enterX = delta > 0 ? '100%' : '-100%';

  list.style.transition = 'transform 0.2s cubic-bezier(0.4,0,1,1)';
  list.style.transform = `translateX(${exitX})`;

  setTimeout(() => {
    renderHistory();
    list.style.transition = 'none';
    list.style.transform = `translateX(${enterX})`;
    list.getBoundingClientRect(); // force reflow
    list.style.transition = 'transform 0.22s cubic-bezier(0,0,0.2,1)';
    list.style.transform = 'translateX(0)';
  }, 200);
}

// ── Events ──
document.getElementById('fab-add').addEventListener('click', openAddSheet);
document.getElementById('settings-btn').addEventListener('click', openSettingsSheet);

document.getElementById('add-amount').addEventListener('input', updateAddConfirmBtn);
document.getElementById('add-amount').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-desc').focus(); });
document.getElementById('add-desc').addEventListener('input', e => renderAddSuggestions(e.target.value));
document.getElementById('add-desc').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAdd(); });
document.getElementById('btn-add-confirm').addEventListener('click', confirmAdd);
document.getElementById('add-overlay').addEventListener('click', closeAddSheet);

document.getElementById('add-suggestions').addEventListener('click', e => {
  const chip = e.target.closest('.suggestion-chip');
  if (chip) { document.getElementById('add-desc').value = chip.dataset.val; renderAddSuggestions(''); }
});

document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
document.getElementById('next-month').addEventListener('click', () => changeMonth(1));

document.getElementById('history-list').addEventListener('click', e => {
  const item = e.target.closest('.expense-item');
  if (item) openEditSheet(item.dataset.id);
});

document.getElementById('sheet-overlay').addEventListener('click', closeEditSheet);
document.getElementById('btn-save').addEventListener('click', saveEdit);
document.getElementById('btn-delete-from-sheet').addEventListener('click', () => askDelete(editingId));

document.getElementById('edit-amount').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('edit-desc').focus(); });
document.getElementById('edit-desc').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); });

document.getElementById('filter-btn').addEventListener('click', openFilterSheet);
document.getElementById('filter-overlay').addEventListener('click', closeFilterSheet);
document.getElementById('btn-apply-filter').addEventListener('click', () => {
  const minVal = document.getElementById('filter-min').value;
  const maxVal = document.getElementById('filter-max').value;
  activeFilter.minAmount = minVal ? parseFloat(minVal) : null;
  activeFilter.maxAmount = maxVal ? parseFloat(maxVal) : null;
  closeFilterSheet();
  render();
});
document.getElementById('btn-clear-filter').addEventListener('click', () => {
  activeFilter = { minAmount: null, maxAmount: null, tag: null };
  document.getElementById('filter-min').value = '';
  document.getElementById('filter-max').value = '';
  document.querySelectorAll('.filter-preset-chip').forEach(c => c.classList.remove('active'));
  closeFilterSheet();
  render();
});
document.querySelectorAll('.filter-preset-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('filter-min').value = chip.dataset.min;
    document.getElementById('filter-max').value = chip.dataset.max;
    syncPresetChips();
  });
});

document.getElementById('settings-overlay').addEventListener('click', closeSettingsSheet);

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-confirm').addEventListener('click', confirmDelete);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ── Apple touch icon ──
(function() {
  const size = 180, r = 40;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
  ctx.fillStyle = '#1a1d27'; ctx.fill();
  ctx.font = '120px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🐸', size/2, size/2+6);
  document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
})();

// ── Init ──
load();
initView();
initSettingsUI();
render();
</script>
